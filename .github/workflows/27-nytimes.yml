# 纽约时报中文版 - 北京时间 9:25
name: 纽约时报 RSS

on:
  schedule:
      - cron: '25 01 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Fetch latest processed URLs
        run: |
          git fetch origin
          git checkout origin/main -- data/processed_urls.json 2>/dev/null || true


      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process feed
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          FEED_NAME: '纽约时报'
          FEED_URL: 'https://feedx.net/rss/nytimes.xml'
          FEED_LANG: 'zh'
          MAX_DAILY: 5
        run: python daily_task_single.py

      - name: Commit processed URLs
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/processed_urls.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update processed URLs [skip ci]"
          
          # 带重试的 push（最多 3 次，指数退避）
          max_retries=3
          for i in \$(seq 1 \$max_retries); do
            git pull --rebase && git push && echo "Push succeeded" && break
            echo "Push failed, attempt \$i/\$max_retries, retrying in \$((5 * i))s..."
            sleep \$((5 * i))
          done
