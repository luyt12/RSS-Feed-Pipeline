name: Test AgentMail API Direct

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Test AgentMail API
        env:
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
        run: |
          echo "=== Testing AgentMail HTTP API ==="
          echo "AGENTMAIL_API_KEY: ${AGENTMAIL_API_KEY:0:20}..."
          echo "AGENTMAIL_INBOX_ID: $AGENTMAIL_INBOX_ID"
          echo ""
          
          echo "=== Making HTTP Request ==="
          echo "URL: https://api.agentmail.to/v0/inboxes/$AGENTMAIL_INBOX_ID/messages/send"
          
          response=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -X POST "https://api.agentmail.to/v0/inboxes/$AGENTMAIL_INBOX_ID/messages/send" \
            -H "Authorization: Bearer $AGENTMAIL_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "to": "HZ-lu2007@outlook.com",
              "subject": "Test from GitHub Actions",
              "text": "This is a test message from GitHub Actions to verify AgentMail HTTP API."
            }')
          
          echo "$response"
          
          echo ""
          echo "=== Test Complete ==="
