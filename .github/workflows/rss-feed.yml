# Reusable workflow for single RSS feed
name: Process Single RSS Feed

on:
  workflow_call:
    inputs:
      feed_name:
        required: true
        type: string
      feed_url:
        required: true
        type: string
      feed_lang:
        required: true
        type: string
      max_daily:
        required: false
        type: number
        default: 5
      skip_trafilatura:
        required: false
        type: boolean
        default: false
      run_id:
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  process-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process feed - ${{ inputs.feed_name }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_API_URL: ${{ secrets.KIMI_API_URL }}
          FEED_NAME: ${{ inputs.feed_name }}
          FEED_URL: ${{ inputs.feed_url }}
          FEED_LANG: ${{ inputs.feed_lang }}
          MAX_DAILY: ${{ inputs.max_daily }}
          SKIP_TRAFILATURA: ${{ inputs.skip_trafilatura }}
        run: |
          python daily_task_single.py

      - name: Commit processed URLs
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/processed_urls.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update processed URLs [skip ci]"
          git pull --rebase || true
          git push || true
