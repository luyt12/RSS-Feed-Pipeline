name: RSS Feed Pipeline

on:
  schedule:
    - cron: '0 7 * * *'   # 北京时间 15:00 - 第一批（已有 feeds）
    - cron: '0 12 * * *'  # 北京时间 20:00 - 第二批（新法律博客）
    - cron: '0 18 * * *'  # 北京时间 02:00（次日）- 第三批
  workflow_dispatch:

permissions:
  contents: write

env:
  kimi_API_KEY: ${{ secrets.kimi_API_KEY }}
  KIMI_MODEL: moonshotai/kimi-k2.5
  KIMI_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  process-feeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Process RSS feeds
        run: python daily_task.py
