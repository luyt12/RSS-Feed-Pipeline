# Not Boring - 北京时间 19:00 (UTC 11:00)
name: Not Boring RSS

on:
  schedule:
    - cron: '0 11 * * *'  # UTC 11:00 = 北京 19:00
  workflow_dispatch:

jobs:
  process:
    uses: .github/workflows/rss-feed.yml@main
    with:
      feed_name: 'Not Boring'
      feed_url: 'https://www.notboring.co/feed'
      feed_lang: 'en'
      max_daily: 3
      skip_trafilatura: false
    secrets: inherit
