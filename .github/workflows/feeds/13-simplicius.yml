name: RSS Feed - Simplicius76

on:
  schedule:
    - cron: '30 10 * * *'  # 18:30 Beijing time
  workflow_dispatch:

jobs:
  fetch-feed:
    uses: ./templates/rss-feed.yml@main
    with:
      feed_name: "Simplicius76 Substack"
      feed_url: "https://simplicius76.substack.com/feed"
      feed_language: "en"
    secrets: inherit
