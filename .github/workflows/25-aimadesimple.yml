name: AI Made Simple RSS
on:
  schedule:
      - cron: '07 43 * * *'  # 北京时间 04:00
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install feedparser requests trafilatura beautifulsoup4 lxml
      - name: Process feed
        env:
          FEED_NAME: 'AI Made Simple'
          FEED_URL: 'https://www.artificialintelligencemadesimple.com/feed'
          FEED_LANG: 'en'
          MAX_DAILY: 5
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python daily_task_single.py
      - name: Commit processed URLs
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add data/processed_urls.json
          git commit -m "chore: update processed URLs for AI Made Simple" || true
          git push || true

